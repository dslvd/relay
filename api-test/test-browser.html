<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CDN API Browser Test</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 1rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 2rem;
      text-align: center;
    }

    .header h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .header p {
      opacity: 0.9;
    }

    .content {
      padding: 2rem;
    }

    .config-section {
      background: #f7f9fc;
      padding: 1.5rem;
      border-radius: 0.5rem;
      margin-bottom: 2rem;
    }

    .config-section label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #333;
    }

    .config-section input {
      width: 100%;
      padding: 0.75rem;
      border: 2px solid #e1e4e8;
      border-radius: 0.5rem;
      font-size: 1rem;
      margin-bottom: 1rem;
      transition: border-color 0.3s;
    }

    .config-section input:focus {
      outline: none;
      border-color: #667eea;
    }

    .test-section {
      margin-bottom: 2rem;
    }

    .test-section h2 {
      color: #333;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid #e1e4e8;
    }

    .button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-right: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    }

    .button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .button.secondary {
      background: #6c757d;
    }

    .result {
      background: #f7f9fc;
      border-left: 4px solid #667eea;
      padding: 1rem;
      border-radius: 0.5rem;
      margin-top: 1rem;
      font-family: monospace;
      font-size: 0.9rem;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 400px;
      overflow-y: auto;
    }

    .result.success {
      border-left-color: #28a745;
      background: #d4edda;
    }

    .result.error {
      border-left-color: #dc3545;
      background: #f8d7da;
    }

    .file-input {
      margin: 1rem 0;
    }

    .status {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 1rem;
      font-size: 0.875rem;
      font-weight: 600;
      margin-left: 0.5rem;
    }

    .status.success {
      background: #d4edda;
      color: #155724;
    }

    .status.error {
      background: #f8d7da;
      color: #721c24;
    }

    .status.loading {
      background: #fff3cd;
      color: #856404;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🚀 CDN API Browser Test</h1>
      <p>Test your Vercel Blob CDN API directly from your browser</p>
    </div>

    <div class="content">
      <!-- Configuration -->
      <div class="config-section">
        <h2>Configuration</h2>
        <label for="apiKey">API Key:</label>
        <input type="text" id="apiKey" placeholder="vbc_your_api_key_here">
        
        <label for="baseUrl">Base URL:</label>
        <input type="text" id="baseUrl" value="http://localhost:3000" placeholder="http://localhost:3000">
      </div>

      <!-- Test 1: Get API Info -->
      <div class="test-section">
        <h2>1. Get API Key Info</h2>
        <button class="button" onclick="testGetInfo()">Get Info</button>
        <div id="result-info"></div>
      </div>

      <!-- Test 2: Upload File -->
      <div class="test-section">
        <h2>2. Upload File</h2>
        <div class="file-input">
          <input type="file" id="fileInput">
        </div>
        <button class="button" onclick="testUpload()">Upload File</button>
        <div id="result-upload"></div>
      </div>

      <!-- Test 3: List Files -->
      <div class="test-section">
        <h2>3. List Files</h2>
        <button class="button" onclick="testListFiles()">List Files</button>
        <div id="result-list"></div>
      </div>

      <!-- Test 4: Run All Tests -->
      <div class="test-section">
        <h2>Run All Tests</h2>
        <button class="button" onclick="runAllTests()">🧪 Run All Tests</button>
        <button class="button secondary" onclick="clearResults()">Clear Results</button>
      </div>
    </div>
  </div>

  <script>
    const API_VERSION = '/api/v1';

    function getConfig() {
      const apiKey = document.getElementById('apiKey').value.trim();
      const baseUrl = document.getElementById('baseUrl').value.trim();

      if (!apiKey) {
        alert('Please enter your API key');
        throw new Error('API key required');
      }

      return { apiKey, baseUrl };
    }

    function showResult(elementId, content, isSuccess = true) {
      const element = document.getElementById(elementId);
      element.className = `result ${isSuccess ? 'success' : 'error'}`;
      element.textContent = typeof content === 'string' ? content : JSON.stringify(content, null, 2);
    }

    function showLoading(elementId) {
      const element = document.getElementById(elementId);
      element.className = 'result';
      element.textContent = 'Loading...';
    }

    async function apiRequest(endpoint, options = {}) {
      const { apiKey, baseUrl } = getConfig();
      const url = `${baseUrl}${API_VERSION}${endpoint}`;

      const response = await fetch(url, {
        ...options,
        headers: {
          'Authorization': `Bearer ${apiKey}`,
          'Content-Type': 'application/json',
          ...options.headers,
        },
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error || 'Request failed');
      }

      return data;
    }

    async function testGetInfo() {
      showLoading('result-info');
      
      try {
        const result = await apiRequest('/info');
        showResult('result-info', result, true);
      } catch (error) {
        showResult('result-info', `Error: ${error.message}`, false);
      }
    }

    async function testUpload() {
      const fileInput = document.getElementById('fileInput');
      const file = fileInput.files[0];

      if (!file) {
        alert('Please select a file first');
        return;
      }

      showLoading('result-upload');

      try {
        const { apiKey, baseUrl } = getConfig();

        // Step 1: Get presigned upload URL
        const uploadInit = await apiRequest('/upload', {
          method: 'POST',
          body: JSON.stringify({
            filename: file.name,
            contentType: file.type,
            size: file.size,
          }),
        });

        // Step 2: Upload the file
        const uploadResponse = await fetch(uploadInit.data.uploadUrl, {
          method: 'PUT',
          headers: {
            'Content-Type': file.type,
          },
          body: file,
        });

        if (!uploadResponse.ok) {
          throw new Error('Upload failed');
        }

        showResult('result-upload', {
          status: 'Success',
          fileId: uploadInit.data.fileId,
          downloadUrl: uploadInit.data.downloadUrl,
          directDownloadUrl: uploadInit.data.directDownloadUrl,
        }, true);

        // Store for later tests
        window.lastUploadedFileId = uploadInit.data.fileId;
      } catch (error) {
        showResult('result-upload', `Error: ${error.message}`, false);
      }
    }

    async function testListFiles() {
      showLoading('result-list');

      try {
        const result = await apiRequest('/files?limit=10');
        showResult('result-list', result, true);
      } catch (error) {
        showResult('result-list', `Error: ${error.message}`, false);
      }
    }

    async function runAllTests() {
      console.log('Running all tests...');
      await testGetInfo();
      await new Promise(resolve => setTimeout(resolve, 500));
      await testListFiles();
    }

    function clearResults() {
      const results = ['result-info', 'result-upload', 'result-list'];
      results.forEach(id => {
        const element = document.getElementById(id);
        element.textContent = '';
        element.className = 'result';
      });
    }

    // Auto-load API key from localStorage if available
    window.addEventListener('DOMContentLoaded', () => {
      const savedApiKey = localStorage.getItem('cdn_api_key');
      const savedBaseUrl = localStorage.getItem('cdn_base_url');
      
      if (savedApiKey) {
        document.getElementById('apiKey').value = savedApiKey;
      }
      if (savedBaseUrl) {
        document.getElementById('baseUrl').value = savedBaseUrl;
      }

      // Save to localStorage on change
      document.getElementById('apiKey').addEventListener('change', (e) => {
        localStorage.setItem('cdn_api_key', e.target.value);
      });
      document.getElementById('baseUrl').addEventListener('change', (e) => {
        localStorage.setItem('cdn_base_url', e.target.value);
      });
    });
  </script>
</body>
</html>
